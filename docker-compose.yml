########################### NETWORKS
networks:
  wan:
    name: wan
    driver: bridge

  itflow-db:
    name: itflow-db
    external: false

########################### VOLUMES

volumes:
  itflow-db:
  itflow-data:
  itflow-db-backups:
  
########################### ITFLOW
services:
  itflow:
    platform: linux/amd64
    hostname: itflow
    container_name: itflow
    # Comment out image for DockerHub image, use build for local DockerFile if you prefer to build from base
    image: itfloworg/itflow:latest
    #build: 
      #context: .
      #dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: 
      - itflow-db
          condition: service_healthy  # ← waits for DB to be ready, not just started
    networks:
      - wan
      - itflow-db
    ports:
      - "8080:8080"
    environment:
      - TZ=$TZ
      - ITFLOW_NAME=ITFlow
      - ITFLOW_URL=$ROOT_DOMAIN
      - ITFLOW_PORT=8080
      - ITFLOW_REPO=github.com/itflow-org/itflow
      - ITFLOW_REPO_BRANCH=master
      - ITFLOW_LOG_LEVEL=info
      - ITFLOW_DB_HOST=itflow-db
      - ITFLOW_DB_PASS=$ITFLOW_DB_PASS
    volumes:
      - itflow-data:/var/www/localhost/htdocs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s      

  itflow-db:
    hostname: itflow-db
    container_name: itflow-db
    image: mariadb:10.11.6
    restart: unless-stopped
    networks:
      - itflow-db
    environment:
      - MARIADB_RANDOM_ROOT_PASSWORD=true
      - MARIADB_DATABASE=itflow
      - MARIADB_USER=itflow
      - MARIADB_PASSWORD=$ITFLOW_DB_PASS
    volumes:
      - itflow-db:/var/lib/mysql/    
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  itflow-db-backup:
        image: fradelg/mysql-cron-backup
        container_name: itflow_db_backups
        volumes:
          - itflow-db-backups:/backup
        networks:
          - itflow-db
        depends_on:
          itflow-db:
            condition: service_healthy
        environment:
          - MYSQL_DATABASE=itflow
          - MYSQL_USER=itflow
          - MARIADB_PASSWORD=$ITFLOW_DB_PASS
          - TZ=$TZ
          - MYSQL_HOST=itflow-db
          - MAX_BACKUPS=3 #change to your liking
#          - INIT_BACKUP=0 #run a backup at startup
#          - EXIT_BACKUP=0 #run a backup on exit
          # Every day at 23:00
          - CRON_TIME=0 23 * * *
          # Make it small
          - GZIP_LEVEL=9
          # As of MySQL 8.0.21 this is needed
          - MYSQLDUMP_OPTS=--no-tablespaces
        restart: unless-stopped

